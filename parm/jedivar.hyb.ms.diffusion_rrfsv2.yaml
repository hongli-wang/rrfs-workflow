_member: &memberConfig
  date: &ANALYSIS_DATE '@analysisDate@'
  state variables: &incvars [water_vapor_mixing_ratio_wrt_moist_air, air_pressure_at_surface, air_temperature, northward_wind, eastward_wind, cloud_liquid_water, cloud_liquid_ice, rain_water, snow_water, graupel, equivalent_reflectivity_factor]
  stream name: ensemble

output:
  filename: mpasout.nc
  stream name: analysis
variational:
  minimizer:
    algorithm: DRPCG
  iterations:
  - geometry:
      nml_file: ./namelist.atmosphere
      streams_file: ./streams.atmosphere
      deallocate non-da fields: true
      interpolation type: unstructured
    gradient norm reduction: 1e-3
    ninner: 50
  - geometry:
      nml_file: ./namelist.atmosphere
      streams_file: ./streams.atmosphere
      deallocate non-da fields: true
      interpolation type: unstructured
    gradient norm reduction: 1e-3
    ninner: 50
cost function:
  cost type: 3D-Var
  time window:
     begin: '@beginDate@'
     length: PT4H
  jb evaluation: false
  geometry:
    nml_file: ./namelist.atmosphere
    streams_file: ./streams.atmosphere
    deallocate non-da fields: true
    interpolation type: unstructured
  analysis variables: *incvars
  background:
    state variables:
    - water_vapor_mixing_ratio_wrt_moist_air
    - air_pressure_at_surface
    - air_temperature
    - northward_wind
    - eastward_wind
    - air_potential_temperature
    - dry_air_density
    - u
    - water_vapor_mixing_ratio_wrt_dry_air
    - air_pressure
    - landmask
    - seaice_fraction
    - snowc
    - skin_temperature_at_surface
    - ivgtyp
    - isltyp
    - snowh
    - vegetation_area_fraction
    - air_temperature_at_2m
    - water_vapor_mixing_ratio_wrt_moist_air_at_2m
    - eastward_wind_at_10m
    - northward_wind_at_10m
    - lai
    - smois
    - tslb
    - pressure_p
    - cloud_liquid_water
    - cloud_liquid_ice
    - graupel
    - rain_water
    - snow_water
    - cldfrac
    - equivalent_reflectivity_factor
    - w
    filename: mpasout.nc
    date: *ANALYSIS_DATE
  background error:
    covariance model: hybrid
    components:
    - covariance:
        covariance model: SABER
        saber central block:
          saber block name: gsi static covariance
          read:
            gsi akbk: foo.nc
            gsi error covariance file: berror_stats
            gsi berror namelist file: gsiparm_regional.anl
            processor layout x direction: "40"
            processor layout y direction: "20"
            debugging deep bypass gsi B error: false
            debugging mode: false
            regional mode: true
        saber outer blocks:
        - saber block name: interpolation
          inner geometry:
            function space: StructuredColumns
            custom grid matching gsi:
              type: rotated_lonlat
              lats: "593"
              lons: "921"
              lat_start: "-15.984000"
              lat_end: "15.984000"
              lon_start: "-24.840000"
              lon_end: "24.840000"
              north_pole_lat: "51.226749"
              north_pole_lon: "82.592899"
            custom partitioner matching gsi:
              bands: "20"  # matches GSI partition for 1 or 2 MPI tasks, but too simplistic in general
            halo: 1
          forward interpolator:
            local interpolator type: oops unstructured grid interpolator
          inverse interpolator:
            local interpolator type: oops unstructured grid interpolator
          state variables to inverse:  # Make sure to also re-order the state passed to GSI-B constructor
          - eastward_wind
          - northward_wind
          - air_temperature
          - air_pressure_at_surface
          - air_pressure
          - water_vapor_mixing_ratio_wrt_moist_air
      weight:
        value: "0.1"
    - covariance:
        covariance model: SABER
        covariance type: hybrid
        run components recursively: true
        components:
        - weight:
            value: 1.0
          covariance:
            covariance type: ensemble
            ensemble pert:
              date: *ANALYSIS_DATE
              members from template:
                template:
                  <<: *memberConfig
                  filename: data/ens_perts_diffusion/wb1_mem%iMember%
                pattern: "%iMember%"
                nmembers: 30
            localization:
              localization method: SABER
              saber central block:
                saber block name: diffusion
                active variables: *incvars
                read:
                  groups:
                  - variables: *incvars
                    multivariate strategy: duplicated
                    horizontal:
                      filepath: data/diffusionloc/mpas_conus3km.diffusion_hz
                    vertical:
                      levels: 59
                      filepath: data/diffusionloc/mpas_conus3km.diffusion_vt
        - weight:
            value: 1.0
          covariance:
            covariance type: ensemble
            ensemble pert:
              date: *ANALYSIS_DATE
              members from template:
                template:
                  <<: *memberConfig
                  filename: data/ens_perts_diffusion/wb2_mem%iMember%
                pattern: "%iMember%"
                nmembers: 30
            localization:
              localization method: SABER
              saber central block:
                saber block name: diffusion
                active variables: *incvars
                read:
                  groups:
                  - variables: *incvars
                    multivariate strategy: duplicated
                    horizontal:
                      filepath: data/diffusionloc/mpas_conus3km.diffusion_hz
                    vertical:
                      levels: 59
                      filepath: data/diffusionloc/mpas_conus3km.diffusion_vt

      weight:
        value: "0.9"
  observations:
     observers:
     - obs space:
         name: refl10cm
         distribution:
           name: "RoundRobin"
           halo size: 500e3
         obsdatain:
           engine:
             type: H5File
             obsfile: data/obs/ioda_mrms_refl.nc
             missing file action: "warn"
         obsdataout:
           engine:
             type: H5File
             allow overwrite: true
             obsfile: jdiag_mrms_refl.nc
         io pool:
           write multiple files: false
         _source: mrms
         simulated variables:
         - equivalentReflectivityFactor
       obs operator:
         name: VertInterp
         vertical coordinate: height_above_mean_sea_level
         observation vertical coordinate: height
         interpolation method: linear
         observation alias file: obsop_name_map.yaml
       obs localizations:
         - localization method: Horizontal Gaspari-Cohn
           lengthscale: 200e3 # orig
       _obsname: refl10cm
       obs filters:
       - filter: Background Check
         filter variables:
         - name: equivalentReflectivityFactor
         threshold: 12.0
         action:
           name: reject
     - obs space:
         name: adpsfc_t181
         distribution:
           name: "RoundRobin"
           halo size: 500e3
         obsdatain:
           engine:
             type: H5File
             obsfile: "data/obs/ioda_adpsfc.nc"
             missing file action: "warn"
           obsgrouping:
             group variables: ["stationIdentification"]
             sort variable: "pressure"
             sort order: "descending"
         obsdataout:
           empty obs space action: "skip output"
           engine:
             type: H5File
             obsfile: jdiag_adpsfc_t181.nc
             allow overwrite: true
         io pool:
           max pool size: 1
         observed variables: [airTemperature]
         simulated variables: [airTemperature]

       obs operator:
           name: VertInterp
           vertical coordinate: air_pressure
           observation vertical coordinate: pressure
           observation vertical coordinate group: MetaData
           interpolation method: log-linear
           #gsi geovals:
           #  filename: "obsout/sfc_tsen_geoval_2024052700.nc"
           #  levels_are_top_down: False
           variables:
           - name: airTemperature

       linear obs operator:
         name: VertInterp

       obs error:
         covariance model: diagonal

       obs localizations:
         - localization method: Horizontal Gaspari-Cohn
           lengthscale: 200e3 # orig

       obs filters:
         # ------------------
         # airTemperature (181)
         # ------------------
         # Reject all obs with QualityMarker > 3
         - filter: RejectList
           filter variables:
           - name: airTemperature
           where:
           - variable: QualityMarker/airTemperature
             is_in: 4-15
             value: is_not_valid
           where operator: or
           action:
             name: reduce obs space

         # Time window filter
         - filter: Domain Check
           where:
             - variable:
                 name: MetaData/timeOffset # units: s
               minvalue: -900
               maxvalue:  900
           action:
             name: reduce obs space

         # Duplicate Check
#         - filter: Temporal Thinning
#           filter variables:
#           - name: airTemperature
#           min_spacing: PT90M
#           tolerance: PT0H
#           seed_time: "2024-05-08T04:00:00Z"
#           category_variable:
#             name: MetaData/longitude_latitude_pressure
#           action:
#             name: reduce obs space

         # Online regional domain check
         - filter: Bounds Check
           filter variables:
           - name: airTemperature
           test variables:
           - name:  GeoVaLs/observable_domain_mask
           minvalue: 0.0
           maxvalue: 0.5

         # Initial error assignment
         - filter: Perform Action
           filter variables:
           - name: airTemperature
           where:
           - variable: ObsType/airTemperature
             is_in: 181
           action:
             name: assign error
             error function:
               name: ObsFunction/ObsErrorModelStepwiseLinear
               options:
                 xvar:
                   name: MetaData/pressure
                 xvals: [110000, 105000, 100000, 95000, 90000, 85000, 80000, 75000, 70000, 65000, 60000, 55000, 50000, 45000, 40000, 35000, 30000, 25000, 20000, 15000, 10000, 7500, 5000, 4000, 3000, 2000, 1000, 500, 400, 300, 200, 100, 0]
                 errors: [0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528, 0.7528]
                 #errors: [1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056, 1.5056]

